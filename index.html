    <script>
      // Prevent third party scripts or sandbox wrappers from failing when overriding window.fetch
      (function() {
        try {
          if (window.fetch) {
            let currentFetch = window.fetch;
            
            const makeFetchWritable = (obj) => {
              try {
                const desc = Object.getOwnPropertyDescriptor(obj, 'fetch');
                if (desc && !desc.configurable) {
                  return false;
                }
                Object.defineProperty(obj, 'fetch', {
                  get() {
                    return currentFetch;
                  },
                  set(newValue) {
                    currentFetch = newValue;
                  },
                  configurable: true,
                  enumerable: true
                });
                return true;
              } catch (err) {
                return false;
              }
            };

            // Apply to window, Window.prototype, and globalThis to ensure maximum compatibility in strict mode
            let done = makeFetchWritable(window);
            if (!done && typeof Window !== 'undefined' && Window.prototype) {
              makeFetchWritable(Window.prototype);
            }
            if (typeof globalThis !== 'undefined' && globalThis !== window) {
              makeFetchWritable(globalThis);
            }
          }
        } catch (e) {
          console.warn('Could not configure window.fetch writable wrapper:', e);
        }
      })();
    </script>
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
